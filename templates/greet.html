{% extends 'base.html' %}

{% block content %}
<section class="mx-auto max-w-5xl px-4 py-24 sm:px-6 lg:px-8">
    <div class="overflow-hidden rounded-[2.3rem] border border-forest/10 bg-white shadow-heritage lg:grid lg:grid-cols-[0.9fr,1.1fr]">
        <div class="relative min-h-[20rem]">
            <img src="{{ url_for('static', filename='images/7.jpg') }}" alt="Kerala greeting backdrop" class="absolute inset-0 h-full w-full object-cover">
            <div class="absolute inset-0 bg-[linear-gradient(180deg,rgba(10,24,18,0.16),rgba(10,24,18,0.62))]"></div>
        </div>
        <div class="flex items-center px-6 py-12 sm:px-10 lg:px-14">
            <div>
                <span class="section-kicker">Greeting</span>
                <h1 class="mt-6 font-serif text-5xl text-forest sm:text-6xl">Hello, {{ name }}.</h1>
                <p class="mt-6 max-w-xl text-base leading-8 text-slate-600">Welcome to the Kerala Tourism experience. This route is now styled to match the rest of the site while keeping the dynamic greeting intact.</p>
                <a href="{{ url_for('home') }}" class="gold-button mt-8 inline-flex items-center justify-center rounded-full px-7 py-4 text-sm font-bold uppercase tracking-[0.28em]">Back to Home</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
